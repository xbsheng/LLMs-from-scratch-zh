# ── sync-translate.yml ──
# 每日自动同步上游仓库，翻译变更内容，生成 PR
#
# 所需 GitHub Secrets:
#   TRANSLATE_API_KEY    — API 秘钥
#
# 所需 GitHub Variables (Settings → Variables):
#   TRANSLATE_BASE_URL   — API 地址 (default: https://token-plan-cn.xiaomimimo.com/v1)
#   TRANSLATE_MODEL      — 模型名 (default: mimo-v2.5-pro)

name: Sync & Translate

on:
  # 每天 UTC 16:00 (北京 00:00) 自动运行
  schedule:
    - cron: "0 16 * * *"

  # 手动触发（可选 force 参数做全量翻译）
  workflow_dispatch:
    inputs:
      force:
        description: "Force full re-translate (ignore cached translations)"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-and-translate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout zh repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai

      - name: Fetch upstream & detect changes
        id: sync
        env:
          OPENAI_API_KEY: ${{ secrets.TRANSLATE_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.TRANSLATE_BASE_URL || 'https://token-plan-cn.xiaomimimo.com/v1' }}
          TRANSLATE_MODEL: ${{ vars.TRANSLATE_MODEL || 'mimo-v2.5-pro' }}
        run: |
          python scripts/sync_upstream.py --repo-dir . \
            ${{ inputs.force == true && '--force' || '' }} \
            > sync_result.json 2>sync_log.txt

          cat sync_log.txt
          echo "--- sync result ---"
          cat sync_result.json

          HAS_CHANGES=$(python -c "import json; d=json.load(open('sync_result.json')); print(str(d['has_changes']).lower())")
          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"

          UPSTREAM_COMMIT=$(python -c "import json; d=json.load(open('sync_result.json')); print(d['upstream_commit'])")
          echo "upstream_commit=$UPSTREAM_COMMIT" >> "$GITHUB_OUTPUT"

          TOTAL=$(python -c "import json; d=json.load(open('sync_result.json')); print(d.get('total_notebooks', 0))")
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Translate changed notebooks
        if: steps.sync.outputs.has_changes == 'true'
        id: translate
        env:
          OPENAI_API_KEY: ${{ secrets.TRANSLATE_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.TRANSLATE_BASE_URL || 'https://token-plan-cn.xiaomimimo.com/v1' }}
          TRANSLATE_MODEL: ${{ vars.TRANSLATE_MODEL || 'mimo-v2.5-pro' }}
        run: |
          python scripts/run_translate.py sync_result.json . \
            --incremental \
            > translate_log.txt 2>&1 || true

          cat translate_log.txt

          # Count how many cells were actually translated
          TRANSLATED=$(grep -c "🔄" translate_log.txt 2>/dev/null || echo "0")
          REUSED=$(grep -c "♻️" translate_log.txt 2>/dev/null || echo "0")
          echo "translated=$TRANSLATED" >> "$GITHUB_OUTPUT"
          echo "reused=$REUSED" >> "$GITHUB_OUTPUT"

      - name: Update tracked commit
        if: steps.sync.outputs.has_changes == 'true'
        run: |
          echo "${{ steps.sync.outputs.upstream_commit }}" > .upstream-commit

      - name: Check for changes
        if: steps.sync.outputs.has_changes == 'true'
        id: diff
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
            echo "✅ No actual changes after translation"
          else
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
            CHANGED_FILES=$(git diff --cached --name-only | head -20)
            echo "Changed files:"
            echo "$CHANGED_FILES"
          fi

      - name: Create Pull Request
        if: steps.sync.outputs.has_changes == 'true' && steps.diff.outputs.has_diff == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "sync: translate upstream changes (${{ steps.sync.outputs.upstream_commit }})"
          branch: "sync/translate-${{ github.run_id }}"
          delete-branch: true
          title: "🔄 同步翻译：上游更新 ${{ steps.sync.outputs.upstream_commit }}"
          body: |
            ## 自动同步翻译 PR

            **上游 commit:** `${{ steps.sync.outputs.upstream_commit }}`
            **翻译 cells:** ${{ steps.translate.outputs.translated }} 新翻译, ${{ steps.translate.outputs.reused }} 复用缓存

            ### 审核说明
            - Markdown 内容已自动翻译为中文
            - 代码单元格保持原样未修改
            - 技术术语采用「中文(English)」格式
            - 每个翻译的 cell 带有 `_translation` metadata 记录 hash 和模型信息

            ---
            > 🤖 This PR was auto-generated by the sync-translate workflow.
            > Please review the translations before merging.
          labels: |
            translation
            automated

      - name: Clean up staging
        if: always()
        run: rm -rf .upstream-staging sync_result.json sync_log.txt translate_log.txt

      - name: Summary
        if: always()
        run: |
          echo "## 📊 Sync & Translate Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Has upstream changes:** ${{ steps.sync.outputs.has_changes }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Upstream commit:** \`${{ steps.sync.outputs.upstream_commit }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Notebooks processed:** ${{ steps.sync.outputs.total }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Cells translated:** ${{ steps.translate.outputs.translated }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Cells reused:** ${{ steps.translate.outputs.reused }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **PR created:** ${{ steps.diff.outputs.has_diff == 'true' && '✅' || '❌ (no diff)' }}" >> "$GITHUB_STEP_SUMMARY"
